<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DACE-II Viva Voce Prep — Team 503: Brainz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0A1628;--teal:#02919F;--teal2:#00B4C5;--teallt:#E0F5F7;
  --white:#fff;--off:#F4F9FA;--text:#0A1628;--muted:#5E7A8A;
  --amber:#D97706;--red:#DC2626;--green:#059669;--blue:#1A5FA8;
  --serif:'DM Serif Display',serif;--sans:'DM Sans',sans-serif;
  --easy:#059669;--medium:#D97706;--hard:#DC2626;
}
body{font-family:var(--sans);background:var(--off);color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--navy);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;flex-direction:column}
.logo-main{font-family:var(--serif);font-size:20px;color:var(--white)}
.logo-sub{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.08em;margin-top:2px}
.header-stats{display:flex;gap:20px}
.hstat{text-align:center}
.hstat-num{font-family:var(--serif);font-size:22px;color:var(--teal2)}
.hstat-label{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.06em;text-transform:uppercase}

/* MODE BAR */
.mode-bar{background:var(--white);border-bottom:1px solid #DDE8EA;padding:0 32px;display:flex;align-items:center;gap:0}
.mode-btn{padding:14px 20px;font-size:13px;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;font-family:var(--sans);transition:all .2s;font-weight:500}
.mode-btn.on{color:var(--teal);border-bottom-color:var(--teal)}
.mode-btn:hover{color:var(--teal)}

/* MAIN LAYOUT */
.layout{display:grid;grid-template-columns:260px 1fr;gap:0;min-height:calc(100vh - 110px)}

/* SIDEBAR */
.sidebar{background:var(--white);border-right:1px solid #DDE8EA;padding:24px 0;position:sticky;top:110px;height:calc(100vh - 110px);overflow-y:auto}
.sb-label{font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;padding:0 20px;margin-bottom:8px;font-weight:600}
.cat-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 20px;border:none;background:none;cursor:pointer;text-align:left;font-family:var(--sans);transition:background .15s;border-left:3px solid transparent}
.cat-btn:hover{background:var(--off)}
.cat-btn.on{background:var(--teallt);border-left-color:var(--teal)}
.cat-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.cat-info{flex:1}
.cat-name{font-size:13px;font-weight:500;color:var(--text)}
.cat-count{font-size:11px;color:var(--muted)}
.cat-btn.on .cat-name{color:var(--teal)}
.sb-divider{height:1px;background:#EEF3F4;margin:12px 20px}

/* MAIN CONTENT */
.main{padding:28px 32px}
.section-header{margin-bottom:24px}
.section-title{font-family:var(--serif);font-size:28px;color:var(--text);margin-bottom:6px}
.section-sub{font-size:13px;color:var(--muted)}
.filter-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:12px;color:var(--muted);font-weight:500}
.diff-btn{padding:5px 12px;border-radius:20px;border:1px solid #DDE8EA;background:none;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .15s;letter-spacing:.04em}
.diff-btn:hover,.diff-btn.on{color:var(--white)}
.diff-btn.e{border-color:var(--easy);color:var(--easy)}.diff-btn.e.on,.diff-btn.e:hover{background:var(--easy)}
.diff-btn.m{border-color:var(--medium);color:var(--medium)}.diff-btn.m.on,.diff-btn.m:hover{background:var(--medium)}
.diff-btn.h{border-color:var(--hard);color:var(--hard)}.diff-btn.h.on,.diff-btn.h:hover{background:var(--hard)}
.diff-btn.all{border-color:var(--teal);color:var(--teal)}.diff-btn.all.on,.diff-btn.all:hover{background:var(--teal);color:#fff}
.search-input{margin-left:auto;padding:6px 14px;border:1px solid #DDE8EA;border-radius:20px;font-size:12px;font-family:var(--sans);outline:none;width:220px;color:var(--text)}
.search-input:focus{border-color:var(--teal)}

/* Q CARDS */
.q-list{display:flex;flex-direction:column;gap:12px}
.q-card{background:var(--white);border:1px solid #DDE8EA;border-radius:10px;overflow:hidden;transition:box-shadow .2s}
.q-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07)}
.q-head{display:flex;align-items:flex-start;gap:12px;padding:18px 20px;cursor:pointer;user-select:none}
.q-num{font-family:var(--serif);font-size:18px;color:var(--teal);min-width:32px;flex-shrink:0;line-height:1}
.q-text{font-size:14px;font-weight:500;color:var(--text);flex:1;line-height:1.5;padding-top:1px}
.q-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.diff-pill{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase}
.dp-easy{background:#D1FAE5;color:#065F46}
.dp-medium{background:#FEF3C7;color:#92400E}
.dp-hard{background:#FEE2E2;color:#991B1B}
.reveal-btn{width:28px;height:28px;border-radius:6px;border:1px solid #DDE8EA;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-size:16px;color:var(--muted)}
.reveal-btn:hover{background:var(--teallt);border-color:var(--teal);color:var(--teal)}
.q-card.open .reveal-btn{background:var(--teal);border-color:var(--teal);color:#fff;transform:rotate(180deg)}
.q-card.done .q-head{background:#F0FBF9}
.q-card.done .q-num{color:var(--green)}
.done-check{font-size:14px;color:var(--green)}
.q-answer{display:none;padding:0 20px 18px;border-top:1px solid #EEF3F4;margin-top:0}
.q-card.open .q-answer{display:block}
.ans-label{font-size:10px;letter-spacing:.12em;color:var(--teal);font-weight:600;text-transform:uppercase;margin-bottom:10px;padding-top:14px}
.ans-text{font-size:13.5px;color:var(--text);line-height:1.7}
.ans-text p{margin-bottom:8px}
.ans-text p:last-child{margin-bottom:0}
.ans-text strong{color:var(--navy);font-weight:600}
.tip-box{background:var(--teallt);border-left:3px solid var(--teal);padding:10px 14px;border-radius:0 6px 6px 0;margin-top:12px;font-size:12px;color:var(--navy);line-height:1.55}
.tip-box b{color:var(--teal);font-size:10px;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px}
.q-actions{display:flex;gap:8px;margin-top:14px}
.mark-btn{padding:6px 14px;border-radius:20px;border:1px solid #DDE8EA;background:none;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .15s;color:var(--muted)}
.mark-btn:hover{border-color:var(--green);color:var(--green)}
.mark-btn.done-btn.marked{background:var(--green);color:#fff;border-color:var(--green)}

/* QUIZ MODE */
#quiz-mode{display:none}
#quiz-mode.on{display:block}
.quiz-card{background:var(--white);border-radius:16px;padding:48px;max-width:700px;margin:0 auto;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.quiz-prog{height:4px;background:#EEF3F4;border-radius:2px;margin-bottom:36px;overflow:hidden}
.quiz-prog-fill{height:4px;background:var(--teal);border-radius:2px;transition:width .4s ease}
.quiz-q{font-size:18px;font-weight:500;color:var(--text);line-height:1.5;margin-bottom:32px;min-height:80px}
.quiz-reveal{padding:14px 28px;background:var(--teal);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:background .2s}
.quiz-reveal:hover{background:var(--teal2)}
.quiz-answer{display:none;margin-top:24px;padding:20px;background:var(--off);border-radius:8px}
.quiz-answer.show{display:block}
.quiz-answer p{font-size:14px;color:var(--text);line-height:1.7}
.quiz-nav{display:flex;gap:12px;margin-top:24px;justify-content:flex-end}
.qnav-btn{padding:10px 24px;border-radius:8px;border:1px solid #DDE8EA;background:none;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .2s;color:var(--text)}
.qnav-btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.qnav-btn:hover{border-color:var(--teal);color:var(--teal)}
.qnav-btn.primary:hover{background:var(--teal);border-color:var(--teal);color:#fff}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.quiz-counter{font-size:12px;color:var(--muted)}
.quiz-diff{}
.empty{text-align:center;padding:60px;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-main">DACE-II Viva Voce Prep</div>
    <div class="logo-sub">Team 503: Brainz &nbsp;·&nbsp; AI-Driven Adaptive Learning Platform</div>
  </div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-num" id="total-count">56</div><div class="hstat-label">Questions</div></div>
    <div class="hstat"><div class="hstat-num" id="done-count">0</div><div class="hstat-label">Practised</div></div>
    <div class="hstat"><div class="hstat-num" id="pct-count">0%</div><div class="hstat-label">Ready</div></div>
  </div>
</header>

<div class="mode-bar">
  <button class="mode-btn on" onclick="setMode('browse')">Browse &amp; Study</button>
  <button class="mode-btn" onclick="setMode('quiz')">Quiz Mode</button>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sb-label">Categories</div>
    <button class="cat-btn on" data-cat="all" onclick="filterCat(this,'all')">
      <div class="cat-icon" style="background:#E0F5F7">📋</div>
      <div class="cat-info"><div class="cat-name">All questions</div><div class="cat-count" id="cnt-all">56 questions</div></div>
    </button>
    <div class="sb-divider"></div>
    <button class="cat-btn" data-cat="community" onclick="filterCat(this,'community')">
      <div class="cat-icon" style="background:#E8EEF7">🏘️</div>
      <div class="cat-info"><div class="cat-name">Community &amp; Background</div><div class="cat-count" id="cnt-community"></div></div>
    </button>
    <button class="cat-btn" data-cat="global" onclick="filterCat(this,'global')">
      <div class="cat-icon" style="background:#FEF3E8">🌏</div>
      <div class="cat-info"><div class="cat-name">Global Perspective</div><div class="cat-count" id="cnt-global"></div></div>
    </button>
    <button class="cat-btn" data-cat="field" onclick="filterCat(this,'field')">
      <div class="cat-icon" style="background:#E8F5E9">🔍</div>
      <div class="cat-info"><div class="cat-name">Fieldwork &amp; Methodology</div><div class="cat-count" id="cnt-field"></div></div>
    </button>
    <button class="cat-btn" data-cat="problem" onclick="filterCat(this,'problem')">
      <div class="cat-icon" style="background:#FEE2E2">⚠️</div>
      <div class="cat-info"><div class="cat-name">Problem Statement</div><div class="cat-count" id="cnt-problem"></div></div>
    </button>
    <button class="cat-btn" data-cat="solution" onclick="filterCat(this,'solution')">
      <div class="cat-icon" style="background:#E0F5F7">💡</div>
      <div class="cat-info"><div class="cat-name">Solution &amp; Digital</div><div class="cat-count" id="cnt-solution"></div></div>
    </button>
    <button class="cat-btn" data-cat="prashast" onclick="filterCat(this,'prashast')">
      <div class="cat-icon" style="background:#EDE7F6">📋</div>
      <div class="cat-info"><div class="cat-name">PRASHAST &amp; Ethics</div><div class="cat-count" id="cnt-prashast"></div></div>
    </button>
    <button class="cat-btn" data-cat="technical" onclick="filterCat(this,'technical')">
      <div class="cat-icon" style="background:#E3F2FD">⚙️</div>
      <div class="cat-info"><div class="cat-name">Technical Design</div><div class="cat-count" id="cnt-technical"></div></div>
    </button>
    <button class="cat-btn" data-cat="critical" onclick="filterCat(this,'critical')">
      <div class="cat-icon" style="background:#FFF3E0">🎯</div>
      <div class="cat-info"><div class="cat-name">Critical / Tough Questions</div><div class="cat-count" id="cnt-critical"></div></div>
    </button>
  </div>

  <div class="main">
    <!-- BROWSE MODE -->
    <div id="browse-mode">
      <div class="section-header">
        <div class="section-title" id="section-title">All Questions</div>
        <div class="section-sub" id="section-sub">Click any question to reveal the answer. Mark as done when you feel confident.</div>
      </div>
      <div class="filter-row">
        <span class="filter-label">Difficulty:</span>
        <button class="diff-btn all on" onclick="filterDiff(this,'all')">All</button>

        <button class="diff-btn m" onclick="filterDiff(this,'medium')">Medium</button>
        <button class="diff-btn h" onclick="filterDiff(this,'hard')">Hard</button>

        <div class="quiz-q" id="quiz-q"></div>

<script>
const QS = [
  // ── COMMUNITY ──────────────────────────────────────────────────────────
  {id:1,cat:'community',diff:'easy',
   q:"Where is the field site school located and why was Thiruvananthapuram chosen for this study?",
   a:`<p>The study was conducted at a government-aided special school in <strong>Thiruvananthapuram district</strong>, the capital city of Kerala, located in the southernmost part of the state.</p><p>Thiruvananthapuram was chosen because it has a well-established special education ecosystem, a population of over 3.3 million, a literacy rate exceeding 93%, and because Kerala was among the first states in India to develop disability screening checklists. The district also reflects the broader digital access reality of Kerala — high smartphone penetration but variable connectivity in semi-urban areas.</p>`,
   tip:"Mention the 93% literacy rate — it's a strong contextual detail that shows you understand the setting."},

  {id:2,cat:'community',diff:'easy',
   q:"What is the age group targeted by this platform and how are children categorised at the school?",
   a:`<p>The platform targets children aged <strong>5 to 14 years</strong> with ASD and ADHD. Schools in this context group children as: Pre-primary (3–5 years), Primary (5–7 years), Secondary (7–11 years), and Pre-vocational / Vocational (11+ years).</p><p>Phase 1 focuses specifically on <strong>Primary and Secondary groups (ages 5–11)</strong>, as this is where foundational skills like colours, shapes, numbers, and basic mathematics are actively taught and where skill regression risk is highest.</p>`,
   tip:"The panel may ask why you excluded pre-primary — answer: very young children require more physical supervision and the app is designed for semi-independent practice with parent guidance."},

  {id:3,cat:'community',diff:'medium',
   q:"What is the socio-economic profile of the families in the community? How does this affect the platform design?",
   a:`<p>Families span a range of socioeconomic levels, with a significant proportion from <strong>lower- and middle-income backgrounds</strong>. Many primary caregivers — often mothers — are full-time caregivers who have stepped away from formal employment due to the demands of supporting a neurodivergent child.</p><p>This directly shapes three design decisions: (1) the platform must be <strong>free or zero-cost</strong>, (2) it must work on <strong>affordable mid-range Android devices</strong>, and (3) the parent interface must be operable with <strong>minimal digital literacy</strong>, as complex workflows would cause abandonment.</p>`,
   tip:"Link economic context directly to design decisions — shows mature systems thinking."},

  {id:4,cat:'community',diff:'medium',
   q:"What is the digital status of the community? What device and connectivity patterns did you find?",
   a:`<p>Field findings showed: most households own at least one Android smartphone; tablet access is variable; connectivity is stable in urban areas but intermittent in semi-urban and rural pockets. Parents primarily use WhatsApp, YouTube, and basic apps — they are not unfamiliar with smartphones but may struggle with complex multi-step application navigation.</p><p>Children have prior exposure to touchscreens through family devices. This informed the <strong>offline-first architecture</strong> with local data caching and background sync — ensuring the app functions without continuous internet access.</p>`,
   tip:"The offline feature is a direct response to this data point — make that connection explicit."},

  {id:5,cat:'community',diff:'medium',
   q:"What is the role of Malayalam in the community and why does it matter for the platform?",
   a:`<p>Malayalam is the <strong>medium of instruction</strong> in the target schools. Children with ASD and ADHD develop their language comprehension, communication patterns, and emotional associations with learning in Malayalam. Teachers confirmed that familiar language cues — songs, greetings, instructor voice — are critical for gaining and maintaining attention.</p><p>An English-language platform would represent a fundamental mismatch. The child's brain would have to process an unfamiliar language while simultaneously trying to learn a concept — doubling the cognitive load. Malayalam audio bridges the gap between school and home.</p>`,
   tip:"The phrase 'doubling the cognitive load' will impress evaluators — it shows you understand learning science."},

  {id:6,cat:'community',diff:'easy',
   q:"Who are the three main user groups and what is each one's role in the platform?",
   a:`<p><strong>Teachers / Special educators</strong> — Content initiators. They log the lesson taught in class and assign a corresponding home revision activity. They also view child progress and parent observations.</p><p><strong>Parents / Caregivers</strong> — Home facilitators. They view the assigned activity, guide the child through it with in-app support, and submit a one-tap observation after the session.</p><p><strong>Children</strong> — End learners. They interact with the child interface which is entirely audio-first in Malayalam, with large buttons, play-based activities, and low-pressure feedback.</p>`,
   tip:"Each role has different technical requirements and UX design principles — be ready to describe what each interface looks like."},

  {id:7,cat:'community',diff:'hard',
   q:"Kerala has excellent public health and education infrastructure. Why is this project still needed?",
   a:`<p>High literacy and good infrastructure do not automatically translate to inclusive digital tools. The existing EdTech ecosystem — DIKSHA, KITE content, state platforms — is designed primarily for mainstream neurotypical learners. None of these platforms address the specific combination of needs that neurodivergent children in Malayalam-medium settings have: short attention sessions, sensory customisation, Malayalam audio, teacher-assigned revision cycles, and offline access.</p><p>The gap is not in physical infrastructure — it is in <strong>pedagogically appropriate, linguistically matched, freely accessible digital learning tools</strong> for a specific underserved population within an otherwise well-served state.</p>`,
   tip:"This is a critical thinking question. Don't be defensive — acknowledge Kerala's strengths, then precisely identify the specific gap."},

  // ── GLOBAL ─────────────────────────────────────────────────────────────
  {id:8,cat:'global',diff:'easy',
   q:"What is the global prevalence of ASD? What does this tell us about the scale of the problem?",
   a:`<p>The US CDC (2023) reports that approximately <strong>1 in 36 children</strong> in the USA has ASD — a significant increase from 1 in 150 in the year 2000. The WHO estimates approximately 1 in 100 globally, though this is widely considered an underestimate due to limited screening in lower-income countries.</p><p>In India, the National Trust estimates over <strong>2 million children</strong> have autism-related conditions. Kerala alone has over <strong>58,000 CWSN enrolled in schools</strong> (Samagra Shiksha Kerala). The scale demonstrates that this is a mainstream public health and education issue, not a niche concern.</p>`,
   tip:"Know the CDC 2023 figure (1 in 36) and the Kerala CWSN figure (58,000+) — these will likely be asked."},

  {id:9,cat:'global',diff:'medium',
   q:"How are similar problems addressed in other countries? What can we learn from them?",
   a:`<p>Several platforms address neurodivergent learning globally: <strong>Otsimo</strong> (Turkey) uses AI to adapt difficulty for ASD/Down syndrome children; <strong>Khan Academy Kids</strong> targets academic readiness but not neurodivergent-specific needs; <strong>LAMP WFL</strong> and <strong>LetMeTalk</strong> support AAC communication. The UK's ICAN and Australia's AEIOU programmes show structured home-school collaboration models.</p><p>The key learning: all these platforms are English-medium, commercially priced, and not aligned with Indian school curriculum cycles. The proposed platform fills the gap by being <strong>Malayalam-first, free, school-curriculum-aligned, and offline-compatible</strong>.</p>`,
   tip:"Know 2-3 international examples and be able to say clearly what they DON'T do that your platform does."},

  {id:10,cat:'global',diff:'medium',
   q:"What Indian policy framework supports this project? Name specific acts.",
   a:`<p><strong>RPwD Act 2016</strong> — Recognises 21 disability conditions including ASD and ADHD. Section 16 mandates free inclusive education; Section 17 mandates assistive devices and technology for children with disabilities.</p><p><strong>NEP 2020</strong> — Emphasises technology-enabled inclusive and personalised learning, and calls for digital tools that extend classroom instruction into homes.</p><p><strong>RTE Act 2009</strong> — Ensures free and compulsory education including for CWSN.</p><p><strong>DPDP Act 2023</strong> — Requires verifiable guardian consent for processing data of minors. The platform's consent flow and data minimisation design addresses this.</p>`,
   tip:"The DPDP Act 2023 is very relevant and often overlooked. Mentioning it shows contemporary legal awareness."},

  {id:11,cat:'global',diff:'hard',
   q:"India's ASD prevalence estimate is much lower than Western countries. Does this mean the problem is smaller in India?",
   a:`<p>No. India's lower estimates are almost certainly a reflection of <strong>underdiagnosis and limited screening infrastructure</strong>, not lower actual prevalence. The PRASHAST status survey (2019) found that 52.9% of states faced difficulty identifying neurodevelopmental conditions, and only 8 states had even begun developing disability identification checklists.</p><p>Under-diagnosis has serious consequences: children who are not identified do not receive appropriate educational support, may be labelled as non-compliant or disruptive, and are denied the services they are legally entitled to under the RPwD Act 2016. The problem in India is likely at least as large as Western estimates — it is simply less visible.</p>`,
   tip:"This is a sophisticated question that tests whether you understand epidemiology vs. social detection. Your answer should show you've thought about why India's numbers look lower."},

  {id:12,cat:'global',diff:'medium',
   q:"What is the ADHD prevalence globally and what specific challenges does ADHD create in educational technology design?",
   a:`<p>ADHD prevalence estimates range from <strong>5–7% of school-aged children</strong> globally (Polanczyk et al., 2015). Children with ADHD have significantly shorter attention spans, difficulty with sustained task engagement, and may be easily overstimulated by busy visual interfaces.</p><p>This directly informed the platform's design: activity sessions are limited to <strong>2–5 minutes</strong>, interfaces are uncluttered with large buttons and minimal text, and a parent-controlled "calm mode" reduces animation and audio to prevent sensory overload. The adaptive logic also detects restlessness signals (session abandonment, delayed response) and suggests a calming song break.</p>`,
   tip:"Connect every design choice back to a field finding or research basis."},

  // ── FIELDWORK ──────────────────────────────────────────────────────────
  {id:13,cat:'field',diff:'easy',
   q:"How many people did you interview and from which stakeholder groups?",
   a:`<p>The team consulted <strong>10 stakeholders</strong> across four groups: 3 special educators (semi-structured interviews), 4 parents/caregivers (structured interviews and informal discussion), 1 school administrator (informal consultation), 1 paediatrician (expert consultation), and 1 special educator with occupational therapy training (expert consultation).</p><p>This multi-stakeholder approach was deliberate — to ensure the platform design reflects the perspectives of everyone involved in a neurodivergent child's educational journey, not just teachers alone.</p>`,
   tip:"Be precise about numbers and methods. 'Multi-stakeholder triangulation' is the technical term for this approach."},

  {id:14,cat:'field',diff:'medium',
   q:"Why did you use qualitative methods rather than a quantitative survey?",
   a:`<p>The primary objective of the field engagement was to understand <strong>lived experience, contextual challenges, and nuanced needs</strong> — information that structured survey questionnaires cannot capture. A quantitative survey would tell us how often something happens; qualitative interviews tell us why it happens and what it feels like from the inside.</p><p>Purposive sampling was used to select participants with direct relevance to the research questions. Semi-structured interviews allowed systematic coverage of key themes while remaining flexible enough to follow emerging insights — for example, the finding about music as a core pedagogical tool emerged organically during an interview and would not have appeared in a pre-structured survey.</p>`,
   tip:"Evaluators may push back: 'But isn't your sample too small?' Answer: for exploratory design research, depth beats breadth. The goal was design insight, not statistical inference."},

  {id:15,cat:'field',diff:'medium',
   q:"What were the most significant insights from the teacher interviews?",
   a:`<p>Three critical insights emerged: (1) <strong>Zero visibility into home practice</strong> — all teachers confirmed they have no reliable mechanism to know whether a child practised at home between sessions. (2) <strong>Music as pedagogy, not entertainment</strong> — Malayalam songs are used at the start of every class as an attention regulation and settling tool, not merely for enjoyment. This directly shaped the design of the session-opening ritual. (3) <strong>Skill regression is a weekly reality</strong> — teachers reported spending significant time re-teaching concepts that children partially lost over the preceding weekend, creating a repetitive cycle that slows overall progress.</p>`,
   tip:"The quote 'It is like starting from zero with some children' is powerful — use it if you remember it."},

  {id:16,cat:'field',diff:'medium',
   q:"What did parents tell you about their experience of supporting their child at home?",
   a:`<p>Parents consistently expressed a pattern of <strong>willing but under-equipped</strong>. They described genuine motivation to help their child practise at home but deep uncertainty about what to practise, how to structure it, and whether their child was progressing. Several parents described attempting to use YouTube content but finding their children became distracted or overstimulated by unrelated content.</p><p>When shown the concept of a teacher-assigned home activity with Malayalam audio guidance, all parent participants responded positively. Key concerns raised were: internet availability, screen time limits, and device battery management — all addressed in the platform design.</p>`,
   tip:"The phrase 'I want to help him, but I don't know what the teacher taught today' — if you can attribute this to a real parent interaction, it's very powerful evidence."},

  {id:17,cat:'field',diff:'hard',
   q:"How did you address ethical considerations when conducting research involving families of neurodivergent children?",
   a:`<p>Several ethical safeguards were observed: (1) <strong>No individually identifiable child data</strong> was collected — field observations are reported only at aggregate level. (2) All participants provided <strong>verbal informed consent</strong> and were briefed on the purpose and scope of the research. (3) The team was careful to avoid language that could be perceived as assessing or labelling children. (4) Access to the school was arranged through institutional channels, ensuring the school administration had visibility and control over the engagement. (5) The team observed the PRASHAST framework's explicit principle that preliminary observations must never be used for diagnosis or labelling.</p>`,
   tip:"Ethics questions are increasingly common in viva voce. Show that you thought about consent, anonymity, and non-maleficence proactively."},

  {id:18,cat:'field',diff:'medium',
   q:"Why was PRASHAST reviewed as part of your methodology and how was it used?",
   a:`<p>PRASHAST (Preliminary Screening for Assessment of School-Age Heterogeneous Children) is a government-validated disability screening checklist developed by CIET-NCERT under the Ministry of Education. It was reviewed because it provides a <strong>nationally standardised framework for understanding what observable educational behaviours teachers already document</strong> about children with neurodevelopmental conditions.</p><p>Specifically, the ASD-specific items in PRASHAST (items 13.1–13.10 in Part 1) — including difficulty following group instructions, echolalia, preference for songs, and resistance to routine changes — directly informed the design of the teacher-facing observation and progress tracking features. PRASHAST was used as a reference only, not for screening; the platform is explicitly non-diagnostic.</p>`,
   tip:"PRASHAST has a 95.76% accuracy match with certified disability data — this statistic demonstrates it is a credible reference source."},

  // ── PROBLEM ────────────────────────────────────────────────────────────
  {id:19,cat:'problem',diff:'easy',
   q:"What is the core problem your project addresses? Explain it in one or two sentences.",
   a:`<p>The core problem is the <strong>structural absence of a reliable, guided, linguistically appropriate digital bridge</strong> between classroom instruction and home-based revision for neurodivergent children in Kerala. Without this bridge, skills fade during non-school periods — and even the best classroom teaching cannot compensate for the lack of structured home reinforcement.</p>`,
   tip:"Practice saying this in one clear sentence. Evaluators will test whether you can articulate the problem succinctly."},

  {id:20,cat:'problem',diff:'medium',
   q:"What is skill regression and why is it particularly severe for neurodivergent children?",
   a:`<p>Skill regression is the <strong>partial or complete loss of previously acquired skills</strong> during periods of reduced practice — such as weekends, school holidays, or illness. It occurs because skills that are not regularly reinforced fade from working memory.</p><p>For neurotypical children, a short break may result in minimal regression. For children with ASD and ADHD, the neurological differences in generalisation, working memory, and procedural consolidation mean that skills are more fragile and require <strong>more frequent, structured repetition</strong> to be maintained. Research documents measurable regression after gaps as short as five to ten days without structured practice.</p>`,
   tip:"This is the foundational clinical basis for your project. Know it well — evaluators will probe whether you understand why this is neurodivergent-specific."},

  {id:21,cat:'problem',diff:'medium',
   q:"Why can't parents simply use existing apps like YouTube or Khan Academy for home practice?",
   a:`<p>General platforms fail this community for specific reasons: <strong>YouTube</strong> is unstructured and algorithmically drives children toward tangential content, causing overstimulation and distraction. <strong>Khan Academy Kids</strong> is English-medium, does not align with the school's lesson schedule, lacks sensory customisation, and does not connect to the teacher's specific lesson of the day. No existing platform provides a <strong>teacher-assigned, curriculum-aligned, Malayalam-audio, sensory-adaptive, offline-capable</strong> home practice experience.</p>`,
   tip:"Don't attack other platforms unfairly — frame it as 'these were designed for a different purpose, not a different quality.'"},

  {id:22,cat:'problem',diff:'hard',
   q:"Why does teacher invisibility into home practice matter? What is lost without this data?",
   a:`<p>When teachers have no data on home practice, they must plan future lessons based solely on what they observe in the classroom — which is a <strong>systematically incomplete picture</strong>. A child who performs adequately in class may be showing significant regression at home; a child who seems to struggle in class may actually be making good progress with parent support at home.</p><p>Without home data, teachers cannot: identify which children are regressing during holidays and prioritise revision on return; understand whether a child's classroom difficulty reflects a genuine skill gap or merely a home practice deficit; or personalise lesson content to reinforce areas where home practice data shows weakness. This data, even in simple form (completed / skipped), would fundamentally improve the quality of teaching decisions.</p>`,
   tip:"This is a sophisticated analytical question. Show that you understand feedback loops in educational systems."},

  {id:23,cat:'problem',diff:'medium',
   q:"Your project says there are five interconnected problems. Are they all equally important or is there a hierarchy?",
   a:`<p>The problems are interconnected but there is a logical hierarchy. <strong>Skill regression</strong> (Problem 1) is the educational outcome that all other problems contribute to. The <strong>classroom-to-home disconnect</strong> (Problem 2) is the structural cause — if this were solved, Problems 3, 4, and 5 would become more manageable. <strong>Parent helplessness</strong> (Problem 3) and <strong>no Malayalam tools</strong> (Problem 4) are barriers to solving Problem 2. <strong>Teacher invisibility</strong> (Problem 5) is the data consequence of Problem 2 not being solved.</p><p>The platform addresses all five, but Problem 2 — the structural disconnect — is the root cause that the solution design most directly targets.</p>`,
   tip:"Showing hierarchy rather than treating all problems as equal demonstrates analytical maturity."},

  // ── SOLUTION & DIGITAL ─────────────────────────────────────────────────
  {id:24,cat:'solution',diff:'easy',
   q:"Explain the three-role architecture of the platform and how they connect.",
   a:`<p>The platform has three roles: <strong>Teacher</strong> (updates lesson, assigns activity, views progress), <strong>Parent</strong> (views assignment, guides child, logs observation), and <strong>Child</strong> (completes activities in Malayalam audio environment).</p><p>These connect through a <strong>shared backend</strong> that stores lesson assignments, activity data, and progress records. The teacher creates an assignment; the parent sees it on the home screen; the child completes it; the app records the data automatically; the parent adds a one-tap observation; the teacher reviews the aggregated data the next day. This closes the classroom-to-home loop.</p>`,
   tip:"Draw this loop in the air if presenting physically — the visual helps the panel understand the data flow."},

  {id:25,cat:'solution',diff:'medium',
   q:"Why is the child-facing audio strictly in Malayalam? What about children who might prefer English?",
   a:`<p>The target community's children are taught in Malayalam-medium schools. Language is not just a communication tool — it is tied to <strong>emotional recognition, familiarity, and the cognitive associations that children make with their learning environment</strong>. For a child with ASD who finds comfort in predictability, hearing a familiar voice in their home language saying "Nannayi!" (Well done!) carries more weight than the same message in a foreign language.</p><p>Children for whom English would be appropriate are likely already being served by the existing English-language platforms reviewed in the literature. This platform is specifically designed for the Malayalam-medium gap that existing tools do not fill.</p>`,
   tip:"This is a design philosophy question. Show that the Malayalam-first decision is evidence-based, not arbitrary."},

  {id:26,cat:'solution',diff:'medium',
   q:"What is spaced repetition and how does the platform implement it?",
   a:`<p>Spaced repetition is a learning strategy in which previously learned content is reviewed at <strong>increasing intervals</strong> to strengthen long-term memory consolidation. Research shows that reviewing material just before it would otherwise be forgotten produces stronger retention than massed practice.</p><p>The platform implements a simplified version inspired by the <strong>Leitner box system</strong>: concepts are categorised as New, Reviewing, or Mastered. New items are revisited after 1 day, Reviewing items after 3 days, Mastered items after 7 days. This means if a child learns colours on Monday, the app schedules a brief colour revision on Thursday — without the teacher needing to plan it manually.</p>`,
   tip:"Knowing the Leitner system by name adds academic credibility. Also mention that this is the same mechanism behind Anki and Duolingo."},

  {id:27,cat:'solution',diff:'medium',
   q:"How does the adaptive logic work? Give a specific example.",
   a:`<p>The Phase 1 adaptive logic is rule-based rather than AI-driven. Rules are condition–response pairs: if a child answers correctly multiple times consecutively, the system presents a slightly harder variation; if a child gives repeated wrong answers, it repeats the same level with additional visual cues or audio hints.</p><p><strong>Example:</strong> A child is working on colour recognition — tapping the red object. If the child answers 3 of 4 correctly, the activity advances to a 4-option screen instead of 3. If the child gets 3 wrong in a row, the system adds a glowing border around the correct answer as a visual cue and slows the pace. If response time exceeds a threshold suggesting disengagement, the system offers a calming Malayalam song break.</p>`,
   tip:"Always give a concrete example — abstract descriptions of adaptive logic are much harder to follow than specific scenarios."},

  {id:28,cat:'solution',diff:'easy',
   q:"What types of learning activities does Phase 1 include?",
   a:`<p>Phase 1 includes: <strong>Tap the Correct Object</strong> (colours, shapes, animals, numbers), <strong>Match the Pair</strong> (same shapes, same animals), <strong>Drag and Drop</strong> (sorting, joining), <strong>Colouring</strong> (filling shapes and objects), <strong>Counting Game</strong> (fruits, birds, balls), <strong>Story Mode</strong> (Malayalam audio stories), <strong>Song Mode</strong> (Malayalam rhymes connected to the learning topic), and <strong>Puzzle / Joining</strong> (completing broken images).</p><p>The key design insight is that the <strong>same activity template</strong> can be reused across different content — so "Tap the Correct Object" works for colours, shapes, and numbers without rebuilding each one from scratch. This significantly reduces development scope.</p>`,
   tip:"The reusable template concept is the smartest technical design decision — mention it if you want to impress."},

  {id:29,cat:'solution',diff:'medium',
   q:"What is the offline mode and how does data synchronisation work?",
   a:`<p>The offline mode allows <strong>pre-downloaded activities</strong> to be accessed without an internet connection. When the teacher assigns an activity, it is automatically downloaded to the parent's device the next time they open the app with connectivity. During a home session with no internet, the child completes the activity, and the app stores the data — accuracy, attempts, time, completion status — locally on the device.</p><p>When connectivity is restored, the app performs a <strong>background sync</strong> that uploads the locally stored session data to the backend. The teacher sees the data as normal in their dashboard — with no indication that it was collected offline. This design ensures that rural and semi-urban families with intermittent connectivity are not excluded from the teacher visibility benefits.</p>`,
   tip:"This is architecturally the most important feature for the Kerala context — explain it confidently."},

  {id:30,cat:'solution',diff:'medium',
   q:"How does the platform handle low-pressure feedback? Why is this important for ASD?",
   a:`<p>The platform deliberately avoids all negative audio-visual cues on wrong answers: no buzzer sounds, no red cross marks, no failure screens. Instead, if a child selects the wrong answer, a gentle Malayalam voice says <em>"Veendum sramikkaam"</em> (Let's try again) with a soft animation — and the activity repeats with a hint.</p><p>This is clinically important because children with ASD often have <strong>heightened stress responses to perceived failure</strong>. Negative feedback can trigger anxiety, meltdowns, or complete disengagement from the activity. A low-pressure environment where mistakes are treated as natural steps in learning — not failures — maintains engagement and makes the child feel safe. The same principle applies to reward design: rewards are gentle (soft animations, warm praise) rather than overwhelming (loud sounds, flashing lights).</p>`,
   tip:"This shows you understand the sensory and emotional dimension of ASD, not just the learning dimension."},

  // ── PRASHAST ───────────────────────────────────────────────────────────
  {id:31,cat:'prashast',diff:'easy',
   q:"What is PRASHAST and who developed it?",
   a:`<p>PRASHAST stands for <em>Preliminary Screening for Assessment of School-Age Heterogeneous Children for Abilities, Skills and Talents</em>. It is a <strong>Disability Screening Checklist for Schools</strong> developed by CIET-NCERT under the Ministry of Education, Government of India, published in 2022.</p><p>It has two parts: Part 1 is for use by regular classroom teachers for first-level preliminary screening of all students. Part 2 is for use by special educators or counsellors to validate Part 1 findings. The checklist covers all 21 disability conditions recognised by the RPwD Act 2016.</p>`,
   tip:"Know the full expansion of the acronym if asked — evaluators sometimes test this."},

  {id:32,cat:'prashast',diff:'medium',
   q:"How did PRASHAST inform the design of your platform? Give specific examples.",
   a:`<p>PRASHAST's ASD-specific observation items (13.1–13.10 in Part 1) directly mapped to the platform's teacher observation and progress tracking features. Specific connections include: <strong>Item 13.7</strong> (difficulty following group instructions — needs individual instruction) informed the teacher dashboard's ability to flag children who need one-on-one activity mode. <strong>Item 13.8</strong> (appearing uninterested during storytelling) informed the parent observation field "Preferred Mode" — if a child consistently disengages with stories, the app can prioritise song or game modes instead. <strong>Item 13.4</strong> (difficulty with sudden routine changes) directly motivated the consistent session-opening ritual design.</p>`,
   tip:"Know at least 3 specific PRASHAST items and their design implications. This level of detail demonstrates genuine engagement with the document."},

  {id:33,cat:'prashast',diff:'hard',
   q:"Is there any risk that the platform could be misused as a diagnostic tool? How did you mitigate this?",
   a:`<p>This is a legitimate risk that the team took seriously. The platform records data about a child's performance — accuracy, response time, regression patterns — which could be misinterpreted as clinical evidence of a disability. To mitigate this: (1) the app collects only <strong>educational performance data</strong>, not diagnostic indicators. (2) Progress reports use strictly educational language — "activity completion", "correct responses", "engagement duration" — never clinical terminology. (3) A clear disclaimer will appear in the app: "This tool is for learning support only. It does not screen for, diagnose, or assess disability." (4) This positioning is explicitly aligned with PRASHAST's own prohibition on using screening data for labelling children.</p>`,
   tip:"This is a sophisticated safeguarding question. Having a clear, structured answer here shows ethical maturity."},

  {id:34,cat:'prashast',diff:'medium',
   q:"What does the DPDP Act 2023 require for an app handling data of minor children? How does your platform comply?",
   a:`<p>The Digital Personal Data Protection Act 2023 requires: (1) <strong>Verifiable guardian consent</strong> before processing any personal data of minors. (2) <strong>Data minimisation</strong> — only data necessary for the stated purpose may be collected. (3) The right to <strong>erasure</strong> — parents must be able to request deletion of their child's data.</p><p>The platform complies through: an explicit parental consent flow at onboarding (guardian must actively consent before a child profile is created); educational-data-only collection (no medical, diagnostic, or biometric data); and a data deletion option available from the parent account settings. All data is treated as sensitive given that it relates to a minor with a disability.</p>`,
   tip:"The DPDP Act 2023 is very recent and showing you know it signals contemporary legal awareness — most presentations won't mention it."},

  // ── TECHNICAL ──────────────────────────────────────────────────────────
  {id:35,cat:'technical',diff:'medium',
   q:"What technology stack would you recommend for Phase 1 and why?",
   a:`<p><strong>Frontend (mobile):</strong> Flutter — cross-platform (Android and iOS) from a single codebase, excellent performance on mid-range Android devices, strong support for offline SQLite storage and audio playback.</p><p><strong>Backend:</strong> Node.js with Express or FastAPI (Python) — lightweight, rapid development, suitable for the JSON API needs of this application.</p><p><strong>Database:</strong> PostgreSQL for structured relational data (users, students, assignments, sessions); Redis for session caching.</p><p><strong>Audio:</strong> Pre-recorded Malayalam audio by a native speaker (teacher voice preferred) for Phase 1, with a plan to migrate to Google Cloud TTS (ml-IN) in Phase 2 once quality is validated with the community.</p><p><strong>Offline sync:</strong> Flutter's SQLite plugin with background task scheduling for automatic sync on connectivity restore.</p>`,
   tip:"You don't need to know every library — having a clear rationale for each choice is what matters."},

  {id:36,cat:'technical',diff:'medium',
   q:"Why pre-recorded audio rather than Text-to-Speech (TTS) for Phase 1?",
   a:`<p>Two reasons: (1) <strong>Teacher consultation confirmed that voice familiarity matters deeply</strong> for children with ASD. The child interface should sound like a teacher they know — warm, calm, paced like classroom instruction. Google Cloud TTS (ml-IN), while functional, produces synthetic speech that feels impersonal and may not match the prosody patterns children are accustomed to. (2) Pre-recorded audio is <strong>fully offline-capable with zero API cost</strong> — it is simply an audio file bundled with the activity. TTS requires an API call, which requires connectivity and incurs cost.</p><p>The tradeoff is that pre-recorded audio requires effort to produce and update. But for Phase 1's fixed content set (colours, shapes, numbers, songs), this is manageable and delivers significantly better user experience.</p>`,
   tip:"This shows you thought through the implementation practically, not just theoretically."},

  {id:37,cat:'technical',diff:'hard',
   q:"How would the rule-based adaptive logic be implemented technically? What is the data model?",
   a:`<p>Each child has a <strong>learning profile</strong> that tracks, per concept: number of correct responses, number of incorrect responses, number of attempts, response time, and the current Leitner level (New / Reviewing / Mastered). After each session, the profile is updated.</p><p>The adaptive rules engine runs after each activity: it checks whether the thresholds for advancement (e.g., 3 correct out of 4) or regression (e.g., 2 wrong consecutively) have been met, and updates the activity queue accordingly. The spaced revision scheduler reads the next scheduled date for each Reviewing or Mastered concept and injects a brief revision into the upcoming session if the date has passed.</p><p>This can be implemented as a <strong>decision table</strong> — a structured set of condition-action rules evaluated in priority order — without any machine learning. It runs on the device, requires no internet, and is deterministic and explainable.</p>`,
   tip:"Using the terms 'decision table' and 'deterministic' shows software architecture literacy."},

  {id:38,cat:'technical',diff:'medium',
   q:"How will you measure whether the platform is actually reducing skill regression?",
   a:`<p>The platform tracks <strong>regression alerts</strong>: when a child's accuracy on a previously Mastered concept drops below a threshold in a subsequent session (e.g., below 60% accuracy after three days without practice), the system flags a regression event. Over time, the frequency and magnitude of regression events can be compared: between children who use the platform consistently vs. those who use it intermittently, and between holiday periods vs. regular school weeks.</p><p>A simple pre-post design would compare teacher-reported re-teaching time (how much class time spent reviewing previous concepts) before and after the platform's deployment. Even without a randomised controlled trial, consistent reduction in regression frequency is a meaningful and measurable success indicator.</p>`,
   tip:"Evaluators may push: 'But that's not scientific evidence.' Respond: for Phase 1, the goal is to establish a measurable baseline and demonstrate the mechanism works — formal efficacy studies are Phase 3 scope."},

  {id:39,cat:'technical',diff:'hard',
   q:"What are the key differences between Phase 1 rule-based logic and the AI personalisation planned for Phase 2?",
   a:`<p><strong>Phase 1 rule-based:</strong> Predefined condition-action pairs. Deterministic — same inputs always produce the same output. No learning from data. Low computational cost. Explainable. Suitable when there is insufficient data to train a model.</p><p><strong>Phase 2 AI:</strong> Machine learning models trained on accumulated interaction data from real children. Non-deterministic — the system learns from each child's unique patterns and recommends content that is most likely to be effective for that specific learner. Requires sufficient training data (minimum hundreds of hours of interaction per child type). More powerful but also requires model validation, bias checking, and ongoing maintenance.</p><p>The staged approach is deliberate: Phase 1 collects the data that Phase 2 needs to train on. Building AI before you have data is a common mistake in EdTech projects — this platform avoids it.</p>`,
   tip:"The phrase 'building AI before you have data is a common mistake' is a confident, well-informed statement that evaluators will respect."},

  // ── CRITICAL / TOUGH ───────────────────────────────────────────────────
  {id:40,cat:'critical',diff:'hard',
   q:"Your sample size is very small — 10 people from one school. How can you justify basing a platform design on this?",
   a:`<p>This is a fair criticism and the team acknowledges it as a limitation. However, the purpose of Phase 1 field work is <strong>design research, not statistical inference</strong>. The goal was to generate sufficient qualitative insight to inform design decisions — not to produce findings generalisable to all neurodivergent children in India.</p><p>The sample was strategically chosen (purposive sampling) to include all stakeholder roles with direct relevance to the design. The findings showed strong convergence — all 3 teachers independently reported the same core problems; all 4 parents expressed similar helplessness — which increases confidence in the findings despite the small sample. Broader validation is explicitly planned as part of the Phase 1 pilot testing, which will involve multiple schools and a larger participant pool.</p>`,
   tip:"Don't get defensive — acknowledge the limitation, explain the methodological rationale, and show you have a plan to address it."},

  {id:41,cat:'critical',diff:'hard',
   q:"How do you know parents will actually use the app consistently? What's your adoption strategy?",
   a:`<p>Consistent adoption is one of the most significant risks for any EdTech intervention. The design addresses this through several mechanisms: (1) <strong>Minimal friction</strong> — the parent interface requires only viewing an assigned activity and tapping a few options. It should take under 2 minutes to complete. (2) <strong>Teacher authority</strong> — the activity is assigned by the child's teacher, which gives it social weight. Parents are more likely to follow up on something the teacher assigned than something they chose themselves. (3) <strong>Offline mode</strong> — removes the connectivity barrier. (4) <strong>Intrinsic motivation</strong> — parents in interviews described genuine anxiety about their child's learning; a tool that relieves this anxiety creates its own adoption incentive.</p><p>Nevertheless, a formal adoption monitoring plan is part of Phase 1 evaluation — tracking weekly active users, session frequency, and parent observation completion rates.</p>`,
   tip:"This is the most common question about any EdTech project. Having a structured, multi-factor answer shows you've thought beyond the technology."},

  {id:42,cat:'critical',diff:'hard',
   q:"Why does the classroom-to-home gap exist? Couldn't teachers simply send a WhatsApp message?",
   a:`<p>WhatsApp is already used informally, but it has critical limitations: (1) <strong>No structure</strong> — a WhatsApp message describing what to practise gives the parent no activity, no audio guidance, and no instructions. Parents don't know how to turn a text description into a child-appropriate learning session. (2) <strong>No feedback loop</strong> — the teacher sends the message but gets no data back about whether the child practised. (3) <strong>No consistency</strong> — messages are often missed, misunderstood, or forgotten by both teachers and parents. (4) <strong>Teacher workload</strong> — creating daily WhatsApp updates for every child in the class is not sustainable.</p><p>A structured digital platform systematises all of this: the assignment is automatic, the activity is guided, the data is captured without parent effort, and the teacher dashboard aggregates it all.</p>`,
   tip:"This question tests whether you understand the gap between a workaround and a proper solution. Show why ad hoc communication is fundamentally different from structured workflow."},

  {id:43,cat:'critical',diff:'hard',
   q:"What if teachers don't use the app consistently? The whole system depends on teacher input.",
   a:`<p>This is a valid systemic risk. Mitigation strategies include: (1) <strong>Minimal teacher effort design</strong> — assigning a lesson should take under 60 seconds (select topic, select concept, press assign). The teacher does not create content; they simply select from a pre-built library. (2) <strong>Smart defaults</strong> — if the teacher does not update the lesson for a day, the app defaults to spaced revision of previously assigned concepts, so the child always has something meaningful to do. (3) <strong>School administrator visibility</strong> — the admin can see which teachers are actively assigning, creating accountability. (4) <strong>Teacher benefit</strong> — teachers who use it consistently receive home practice data that directly helps them plan better lessons. The tool serves them, not just the child.</p>`,
   tip:"Show that you've designed for the failure mode — not just the ideal case."},

  {id:44,cat:'critical',diff:'hard',
   q:"How does this project contribute to the DACE-II objective of 'digital access for community empowerment'?",
   a:`<p>The DACE-II theme is about using digital access as a tool for community empowerment — particularly for marginalised and underserved populations. This project contributes in three ways: (1) <strong>Access</strong> — it brings structured educational support to families who cannot afford private therapists or specialised home tutoring. Free, offline-capable, and designed for low-literacy users — it specifically removes economic and infrastructure barriers. (2) <strong>Empowerment</strong> — parents who previously felt helpless gain a structured tool and role in their child's education. Teachers gain data they never had. The community's capacity to support these children increases. (3) <strong>Inclusion</strong> — it directly addresses the educational exclusion of a neurodivergent population that existing digital education platforms have not been designed for.</p>`,
   tip:"This is a conceptual framing question that tests whether you understand the DACE framework. Show the connection between the technical solution and the broader empowerment goal."},

  {id:45,cat:'critical',diff:'hard',
   q:"What would you do differently if you could redo the field work phase?",
   a:`<p>Three things: (1) <strong>More parent participants</strong> — ideally 8–10 parents across different socioeconomic levels and geographic locations (urban vs. semi-urban) to better understand the digital access variation. (2) <strong>Structured observation of classroom sessions</strong> — observing an actual teaching session would have provided richer insight into what a structured activity looks like in practice, making the activity design more authentic. (3) <strong>Co-design session with parents</strong> — showing prototype wireframes to parents during the interview phase and collecting their reactions would have given us more specific usability feedback than the current approach of designing from interview insights alone.</p>`,
   tip:"Evaluators appreciate self-awareness. A thoughtful answer to this question demonstrates intellectual honesty and shows you're thinking like a researcher."},

  {id:46,cat:'critical',diff:'medium',
   q:"How is this different from the existing PRASHAST app?",
   a:`<p>The PRASHAST app is a <strong>disability screening tool</strong> for teachers to conduct preliminary screening of children for possible disability conditions. It is a data collection and referral tool, not a learning or home practice tool.</p><p>The proposed platform is entirely different in purpose: it is a <strong>learning support and home reinforcement application</strong> that connects teacher lesson assignments to parent-guided home practice. It does not screen or assess disability at all. The only connection is that PRASHAST's observation framework informed what teacher-facing observation categories to include in the progress tracking features.</p>`,
   tip:"This question tests whether you can distinguish your work from related existing tools."},

  {id:47,cat:'critical',diff:'medium',
   q:"What is the expected timeline for Phase 1 development and deployment?",
   a:`<p>A realistic Phase 1 development timeline would be approximately <strong>4–6 months</strong> from project initiation to pilot deployment: Month 1–2 for detailed design, wireframes, and pre-recorded audio production; Month 2–4 for core feature development (teacher, parent, and child interfaces + offline sync); Month 4–5 for internal testing, bug fixing, and accessibility review; Month 5–6 for pilot deployment with 2–3 teachers and 10–15 families at the study site. After the 6-week pilot, feedback would be incorporated and the Phase 1 version would be formally released.</p>`,
   tip:"If asked about team size: a team of 3–4 developers (1 Flutter, 1 backend, 1 UI/UX, and a part-time tester) is realistic for this scope."},

  {id:48,cat:'critical',diff:'hard',
   q:"What makes this project academically rigorous? How is it more than just an app idea?",
   a:`<p>Academic rigour comes from several dimensions: (1) <strong>Literature grounding</strong> — the design decisions are explicitly linked to published research on ASD learning, spaced repetition, parent involvement, and sensory design. (2) <strong>Policy alignment</strong> — the platform is positioned within the RPwD Act 2016, NEP 2020, and DPDP Act 2023 framework. (3) <strong>Primary data collection</strong> — field consultations with teachers, parents, and medical experts provide real community evidence rather than assumptions. (4) <strong>PRASHAST integration</strong> — using a government-validated educational framework as a design reference adds credibility to the observation features. (5) <strong>Ethical positioning</strong> — the explicit non-diagnostic, non-labelling design philosophy demonstrates that the team has thought beyond the technical into the social and ethical implications of the tool.</p>`,
   tip:"Use the phrase 'evidence-informed design' — it captures what you're doing precisely."},

  {id:49,cat:'critical',diff:'medium',
   q:"What is the biggest risk to the success of this project? How would you manage it?",
   a:`<p>The biggest risk is <strong>low and inconsistent adoption by parents</strong>. Even the most well-designed app fails if the target community doesn't use it regularly. This risk is higher because the community has limited digital literacy and high caregiving stress — both factors that reduce tolerance for friction.</p><p>Risk management: (1) Design the onboarding to take under 3 minutes with a teacher or school staff member present. (2) Start with the most motivated families — those who expressed interest during the field interviews. (3) Build a WhatsApp reminder integration that notifies parents when a new activity is assigned (leverages existing habits). (4) Collect weekly usage data and identify non-users for targeted support. (5) Treat Phase 1 as a learning exercise, not a final product — expect iteration.</p>`,
   tip:"Evaluators want to see risk awareness paired with mitigation strategies. A risk you can't name is a risk you haven't managed."},

  {id:50,cat:'critical',diff:'hard',
   q:"Could this platform inadvertently increase the burden on parents who are already stressed?",
   a:`<p>This is a real risk that the design takes seriously. Mitigations include: (1) <strong>Low-effort parent interface</strong> — the parent's job is to press "Start activity" and then tick three one-tap options after. The app does the rest. We explicitly designed against any interface that requires parents to prepare, plan, or teach. (2) <strong>Asynchronous</strong> — parents can use the app at any time, not at a fixed scheduled hour. (3) <strong>No guilt mechanism</strong> — if a parent skips a day, the app simply queues the activity for next time. There is no notification shaming or streak system. (4) <strong>Framing</strong> — in all parent-facing language, the parent is framed as a facilitator, not a teacher. This reduces the sense of responsibility and replaces it with partnership.</p>`,
   tip:"This is an empathy question disguised as a design question. Showing awareness of parent stress demonstrates community-centred thinking."},

  // More community
  {id:51,cat:'community',diff:'easy',
   q:"What does ASD stand for and what are its key educational characteristics relevant to this project?",
   a:`<p>ASD stands for <strong>Autism Spectrum Disorder</strong>. Key educational characteristics relevant to this platform include: differences in social communication and interaction; preference for predictable routines and resistance to unexpected change; sensory sensitivity (hyper or hypo-sensitivity to sound, light, touch); echolalia (repetition of words/phrases); difficulty generalising learned skills across contexts; and often very strong responses to music and repetition.</p><p>Each of these characteristics shaped specific design decisions: the consistent session-opening ritual (preference for routine), sensory customisation options (sensory sensitivity), Malayalam familiar voice (language familiarity), spaced repetition (generalisation difficulty), and song-based activities (music responsiveness).</p>`,
   tip:"Show that you understand ASD not just as a label but as a set of specific characteristics that the design responds to."},

  {id:52,cat:'solution',diff:'easy',
   q:"What does the parent observation input look like? Why is it one-tap?",
   a:`<p>The parent observation form collects five data points, each as a simple tap selection rather than typed text: <strong>Completion</strong> (Completed / Partially / Skipped), <strong>Help needed</strong> (No help / Some help / Full help), <strong>Engagement</strong> (High / Medium / Low), <strong>Behaviour</strong> (Calm / Distracted / Restless), <strong>Preferred mode</strong> (Song / Story / Game / Colouring / Puzzle).</p><p>One-tap design is intentional: parents have variable digital literacy, are often exhausted after a caregiving session, and may have limited time. A free-text comments field would result in blank submissions — or worse, parents abandoning the observation entirely. Tapping a button is within reach of everyone.</p>`,
   tip:"The design decision of one-tap vs free-text is a specific UX choice that shows user-centred design thinking."},

  {id:53,cat:'global',diff:'easy',
   q:"What is the PRASHAST accuracy rate and what does it tell us?",
   a:`<p>PRASHAST was validated by administering it in 100 schools in Chandigarh. The suspected disability data based on PRASHAST Part 1 and Part 2 was compared to certified disability data from assessment camps. The match was found to be <strong>95.76% similar</strong> — demonstrating strong validity for a school-based screening tool.</p><p>This validates PRASHAST as a credible reference framework. The fact that trained teachers using this checklist can identify disability conditions with 95.76% accuracy supports the use of teacher-reported observation as a meaningful data source — which is the basis for the teacher observation features in the proposed platform.</p>`,
   tip:"This specific statistic (95.76%) is memorable and credible — use it to support your argument about PRASHAST's validity."},

  {id:54,cat:'technical',diff:'medium',
   q:"How would you handle a child who has multiple disabilities — say, both ASD and a visual impairment?",
   a:`<p>Phase 1 acknowledges this as an area for future development. The current design is optimised for children with ASD and ADHD without co-occurring sensory disabilities. However, the platform's accessibility architecture allows for extension: the high-contrast theme and large text options address mild visual impairment, and the audio-first design means children with visual impairment can navigate primarily by voice.</p><p>For children with significant comorbidities, the teacher profile allows the special educator to note specific accommodations. In Phase 3, a dedicated therapist dashboard would allow an occupational therapist or visual impairment specialist to set customised parameters for children with complex needs. The PRASHAST framework itself recognises Multiple Disabilities as a distinct category, which validates this as a future scope priority.</p>`,
   tip:"Acknowledging limitations while showing a development roadmap is more credible than claiming your Phase 1 handles everything."},

  {id:55,cat:'field',diff:'easy',
   q:"What is the classroom teaching method used at the school? How did it influence your app design?",
   a:`<p>Teachers at the field site use <strong>multi-modal methods</strong> including songs and rhymes, visual materials, colour-based activities, one-to-one structured instruction, and sensory stimulation activities. Sessions are kept short — typically 2 to 5 minutes of focused attention per activity — with transitions between activities.</p><p>This directly informed: the app's <strong>session duration</strong> (2–5 minutes per activity), the <strong>song mode</strong> as a core activity type, the <strong>visual-first interface</strong> with colour-dominant content, and the <strong>session-opening ritual</strong> (mirroring the classroom's consistent greeting routine). The goal was to make the home app feel like a continuation of the classroom, not a separate unfamiliar experience.</p>`,
   tip:"The phrase 'the home app should feel like a continuation of the classroom' is a powerful design principle — use it."},

  {id:56,cat:'critical',diff:'hard',
   q:"What would make this project a failure? How would you know?",
   a:`<p>The project would be a failure if, after 3 months of deployment: (1) Parents are using the app fewer than 3 times per week — indicating it has not become part of the home routine. (2) Teachers cannot observe any improvement in the classroom — the whole premise is that home practice improves school performance. (3) Children are disengaging within the first minute of activities — indicating the interface is not appropriate for the population. (4) Teacher assignment rates drop below 70% — indicating the teacher workflow is too burdensome.</p><p>These metrics would be monitored through the platform's own analytics dashboard. If failure indicators emerge in the first 6 weeks, the team would conduct targeted user interviews to diagnose the cause and iterate before declaring Phase 1 complete.</p>`,
   tip:"Defining failure criteria shows sophisticated evaluation thinking. Most teams only define success — being able to articulate failure conditions demonstrates intellectual rigour."}
];

// ── STATE ───────────────────────────────────────────────────────────────
let curCat='all', curDiff='all', searchTerm='', doneSet=new Set(), curMode='browse';
let quizIdx=0, quizList=[], quizRevealed=false;

// ── INIT ────────────────────────────────────────────────────────────────
function init(){
  updateCounts();
  renderBrowse();
  initQuiz();
  updateStats();
}

function updateCounts(){
  const cats=['community','global','field','problem','solution','prashast','technical','critical'];
  cats.forEach(c=>{
    const n=QS.filter(q=>q.cat===c).length;
    const el=document.getElementById('cnt-'+c);
    if(el)el.textContent=n+' question'+(n!==1?'s':'');
  });
  document.getElementById('cnt-all').textContent=QS.length+' questions';
  document.getElementById('total-count').textContent=QS.length;
}

function updateStats(){
  const d=doneSet.size;
  document.getElementById('done-count').textContent=d;
  document.getElementById('pct-count').textContent=Math.round(d/QS.length*100)+'%';
}

function filterCat(btn,cat){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  curCat=cat;
  const titles={all:'All Questions',community:'Community & Background',global:'Global Perspective',field:'Fieldwork & Methodology',problem:'Problem Statement',solution:'Solution & Digital Component',prashast:'PRASHAST & Ethics',technical:'Technical Design',critical:'Critical / Tough Questions'};
  document.getElementById('section-title').textContent=titles[cat]||'Questions';
  renderBrowse();
}

function filterDiff(btn,diff){
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  curDiff=diff;
  renderBrowse();
}

function searchQ(val){
  searchTerm=val.toLowerCase();
  renderBrowse();
}

function getFiltered(){
  return QS.filter(q=>{
    if(curCat!=='all'&&q.cat!==curCat)return false;
    if(curDiff!=='all'&&q.diff!==curDiff)return false;
    if(searchTerm&&!q.q.toLowerCase().includes(searchTerm)&&!q.a.toLowerCase().includes(searchTerm))return false;
    return true;
  });
}

function renderBrowse(){
  const list=document.getElementById('q-list');
  const qs=getFiltered();
  if(qs.length===0){list.innerHTML='<div class="empty">No questions match your filters.</div>';return;}
  list.innerHTML=qs.map((q,i)=>`
    <div class="q-card${doneSet.has(q.id)?' done':''}" id="qcard-${q.id}">
      <div class="q-head" onclick="toggleQ(${q.id})">
        <div class="q-num">${String(i+1).padStart(2,'0')}</div>
        <div class="q-text">${q.q}</div>
        <div class="q-meta">
          ${doneSet.has(q.id)?'<span class="done-check">✓</span>':''}
          <span class="diff-pill dp-${q.diff}">${q.diff}</span>
          <button class="reveal-btn">▾</button>
        </div>
      </div>
      <div class="q-answer">
        <div class="ans-label">Suggested answer</div>
        <div class="ans-text">${q.a}</div>
        ${q.tip?`<div class="tip-box"><b>Presentation tip</b>${q.tip}</div>`:''}
        <div class="q-actions">
          <button class="mark-btn done-btn${doneSet.has(q.id)?' marked':''}" onclick="toggleDone(event,${q.id})">${doneSet.has(q.id)?'✓ Practised':'Mark as practised'}</button>
          <button class="mark-btn" onclick="quizSingle(${q.id})">Practice in quiz mode</button>
        </div>
      </div>
    </div>`).join('');
}

function toggleQ(id){
  const card=document.getElementById('qcard-'+id);
  const wasOpen=card.classList.contains('open');
  document.querySelectorAll('.q-card.open').forEach(c=>c.classList.remove('open'));
  if(!wasOpen)card.classList.add('open');
}

function toggleDone(e,id){
  e.stopPropagation();
  if(doneSet.has(id))doneSet.delete(id);
  else doneSet.add(id);
  updateStats();
  renderBrowse();
  // Re-open if was open
  setTimeout(()=>{
    const card=document.getElementById('qcard-'+id);
    if(card)card.classList.add('open');
  },10);
}

// ── QUIZ ────────────────────────────────────────────────────────────────
function setMode(mode){
  curMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.mode-btn')[mode==='browse'?0:1].classList.add('on');
  document.getElementById('browse-mode').style.display=mode==='browse'?'block':'none';
  document.getElementById('quiz-mode').style.display=mode==='quiz'?'block':'none';
  if(mode==='quiz')startQuiz();
}

function startQuiz(){
  quizList=[...QS].sort(()=>Math.random()-.5);
  quizIdx=0;
  showQuizQ();
}

function initQuiz(){quizList=[...QS].sort(()=>Math.random()-.5);}

function showQuizQ(){
  const q=quizList[quizIdx];
  quizRevealed=false;
  document.getElementById('qprog').style.width=((quizIdx+1)/quizList.length*100)+'%';
  document.getElementById('qcounter').textContent=`Question ${quizIdx+1} of ${quizList.length}`;
  document.getElementById('qdiff').innerHTML=`<span class="diff-pill dp-${q.diff}">${q.diff}</span>`;
  document.getElementById('quiz-q').textContent=q.q;
  document.getElementById('quiz-ans').className='quiz-answer';
  document.getElementById('quiz-ans').innerHTML=`<p>${q.a.replace(/<[^>]+>/g,'')}</p>${q.tip?`<div class="tip-box" style="margin-top:12px"><b>Presentation tip</b>${q.tip}</div>`:''}`;
  document.getElementById('reveal-btn').textContent='Reveal answer';
  document.getElementById('reveal-btn').style.display='inline-block';
}

function revealQuiz(){
  document.getElementById('quiz-ans').className='quiz-answer show';
  document.getElementById('reveal-btn').style.display='none';
  quizRevealed=true;
}

function quizNav(dir){
  quizIdx=Math.max(0,Math.min(quizList.length-1,quizIdx+dir));
  showQuizQ();
}

function quizSingle(id){
  setMode('quiz');
  quizList=QS.filter(q=>q.id===id);
  quizIdx=0;
  showQuizQ();
}

init();
</script>
</body>
</html>
